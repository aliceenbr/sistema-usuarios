{% extends "base.html" %}
{% block title %}Editar - Sistema de Cadastro{% endblock %}
{% block content %}
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
            <i class="bi bi-shield-lock-fill"></i>Sistema de Cadastro
        </a>
        <div class="d-flex align-items-center gap-3">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-house-fill me-1"></i>Dashboard
            </a>
            <a href="{{ url_for('main.perfil', id=usuario_edit.id) }}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-person me-1"></i>Perfil
            </a>
            <span class="text-dark fw-medium">
                <i class="bi bi-person-circle me-1"></i>{{ current_user.nome }}
            </span>
            <a href="{{ url_for('main.logout') }}" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card">
                <div class="card-header">
                    <span><i class="bi bi-pencil-square me-2"></i>Editar Usuario</span>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group mb-3">
                            <label class="form-label">
                                <i class="bi bi-person-fill me-2"></i>Nome Completo
                            </label>
                            <input type="text" name="nome" class="form-control" value="{{ usuario_edit.nome }}" required minlength="2">
                        </div>
                        
                        <div class="form-group mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope-fill me-2"></i>Email
                            </label>
                            <input type="email" name="email" class="form-control" value="{{ usuario_edit.email }}" required>
                        </div>
                        
                        <div class="form-group mb-4">
                            <label class="form-label">
                                <i class="bi bi-lock-fill me-2"></i>Nova Senha
                            </label>
                            <div class="input-group">
                                <input type="password" name="senha" id="senha" class="form-control" placeholder="Deixe vazio para manter">
                                <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
                                    <i class="bi bi-eye" id="iconeSenha"></i>
                                </button>
                            </div>
                            <small class="text-muted mt-2 d-block">
                                <i class="bi bi-info-circle me-1"></i>Minimo 6 caracteres, 1 numero e 1 especial
                            </small>
                        </div>
                        
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle-fill me-2"></i>Salvar Alteracoes
                            </button>
                            <a href="{{ url_for('main.perfil', id=usuario_edit.id) }}" class="btn btn-secondary btn-lg text-center">
                                <i class="bi bi-arrow-left me-2"></i>Voltar ao Perfil
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
