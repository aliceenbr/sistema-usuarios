{% extends "base.html" %}
{% block title %}Dashboard - Sistema de Cadastro{% endblock %}
{% block content %}
<nav class="navbar navbar-expand-lg" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
            <i class="bi bi-shield-lock-fill"></i>Sistema de Cadastro
        </a>
        <div class="d-flex align-items-center gap-3">
            <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
                <span>Tema</span>
            </button>
            <a href="{{ url_for('main.logout') }}" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
        </div>
    </div>
</nav>

<div class="container py-5 text-center">
    <div class="welcome-card mx-auto" style="max-width: 650px; animation-delay: 0.1s;">
        <h1 class="welcome-title mb-2" style="animation: fadeIn 0.8s ease 0.2s backwards;">
            Bem-vindo, {{ current_user.nome.split()[0] }}!
        </h1>
        <p class="welcome-subtitle mb-4" style="animation: fadeIn 0.8s ease 0.4s backwards;">
            <i class="bi bi-shield-check me-1"></i>
            Seus dados estão protegidos e seguros
        </p>
        <img src="https://i.gifer.com/4Mj.gif" alt="Hello Kitty" style="width:100px;height:100px;border-radius:50%;object-fit:cover; margin: 20px 0; animation: fadeIn 0.8s ease 0.3s backwards;">
        <p id="data-hora" class="welcome-subtitle mb-4" style="animation: fadeIn 0.8s ease 0.5s backwards;"></p>
        <div class="mt-4" style="animation: fadeIn 0.8s ease 0.6s backwards;">
            <a href="{{ url_for('main.lista_usuarios') }}" class="btn btn-success btn-lg px-5 py-3" style="animation: pulse 2s infinite;">
                <i class="bi bi-people me-2"></i>Ver Usuários
            </a>
        </div>
    </div>
</div>

<script>
function atualizarDataHora() {
    const agora = new Date();
    const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('data-hora').textContent = agora.toLocaleDateString('pt-BR', opcoes);
}
atualizarDataHora();
setInterval(atualizarDataHora, 60000);
</script>

<footer class="footer">
    <p>Sistema de Cadastro Seguro <i class="bi bi-heart-fill text-danger"></i></p>
</footer>
{% endblock %}
