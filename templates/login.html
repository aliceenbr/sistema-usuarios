{% extends "base.html" %}
{% block title %}Login - Sistema de Cadastro{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 class="login-title">Sistema de Cadastro</h1>
        <p class="login-subtitle">Acesse sua conta para continuar</p>
        
        <form method="POST" class="login-form">
            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-envelope-fill"></i>Email
                </label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-lock-fill"></i>Senha
                </label>
                <div class="input-group">
                    <input type="password" name="senha" id="senha" class="form-control" placeholder="Digite sua senha" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
                        <i class="bi bi-eye" id="iconeSenha"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>
        
        <div class="login-footer">
            <p>Não tem conta? <a href="{{ url_for('main.registrar') }}">Crie uma agora</a></p>
        </div>
        
        <div class="seguranca-aviso mt-3">
            <small class="text-muted">
                <i class="bi bi-lock-fill me-1"></i>
                Seus dados estão protegidos e são armazenados localmente
            </small>
        </div>
    </div>
    
    <div class="login-badge">
        <i class="bi bi-shield-check"></i> Acesso Seguro
    </div>
</div>
{% endblock %}
